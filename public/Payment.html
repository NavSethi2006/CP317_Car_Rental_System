<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Car Rental - Payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFA500;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .payment-box {
            background-color: #B35A00;
            border-radius: 20px;
            padding: 30px 40px;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .payment-box h2 {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: none;
            background-color: #f9f9f7;
            font-size: 15px;
            color: #333;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
        }

        
        .row {
            display: flex;
            gap: 12px;
        }

        .row .field-group {
            flex: 1;
        }

        .pay-btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1.5px solid #333;
            background-color: #f0f0ee;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
            transition: background-color 0.2s;
        }

        .pay-btn:hover {
            background-color: #ddd;
        }

        .back-btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1.5px solid white;
            background-color: transparent;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background-color: rgba(255,255,255,0.15);
        }

        .message {
            display: none;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.3);
            margin: 4px 0;
        }
    </style>
</head>
<body>

    <div class="title">Payment</div>

    <div class="payment-box">
        <h2> Card Details</h2>

        <div class="field-group">
            <label>Cardholder Name</label>
            <input type="text" id="cardName" placeholder="Name on card">
        </div>

        <div class="field-group">
            <label>Card Number</label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
        </div>

        <div class="row">
            <div class="field-group">
                <label>Expiry Date</label>
                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
            </div>
            <div class="field-group">
                <label>CVV</label>
                <input type="password" id="cvv" placeholder="***" maxlength="3">
            </div>
        </div>

        <hr class="divider">

        <p class="message" id="message"></p>

        <button class="pay-btn" onclick="processPayment()">Confirm Card Details</button>
        <button class="back-btn" onclick="window.location.href='rentals.html'">← Back to Rentals</button>
    </div>

    <script>
        
        document.getElementById('cardNumber').addEventListener('input', function () {
            let val = this.value.replace(/\D/g, '').substring(0, 16);
            this.value = val.match(/.{1,4}/g)?.join(' ') || val;
        });

        
        document.getElementById('expiry').addEventListener('input', function () {
            let val = this.value.replace(/\D/g, '').substring(0, 4);
            if (val.length >= 3) val = val.substring(0, 2) + '/' + val.substring(2);
            this.value = val;
        });

        function processPayment() {
            const name = document.getElementById('cardName').value;
            const number = document.getElementById('cardNumber').value;
            const expiry = document.getElementById('expiry').value;
            const cvv = document.getElementById('cvv').value;
            const msg = document.getElementById('message');

            if (!name || !number || !expiry || !cvv) {
                msg.style.display = 'block';
                msg.style.color = 'white';
                msg.textContent = 'Please fill in all fields.';
                return;
            }

            
            const rawNumber = number.replace(/\s/g, '');
            if (rawNumber.length !== 16) {
                msg.style.display = 'block';
                msg.textContent = 'Please enter a valid 16 digit card number.';
                return;
            }

            
            if (cvv.length !== 3) {
                msg.style.display = 'block';
                msg.textContent = 'CVV must be 3 digits.';
                return;
            }

            msg.style.display = 'block';
            msg.style.color = '#90EE90';
            msg.textContent = 'Payment successful! Redirecting...';

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        }
    </script>

</body>
</html>
